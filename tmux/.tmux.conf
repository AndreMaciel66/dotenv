# ─────────────────────────────────────────────────────────────
# tmux — config minimalista sem plugins
# Paleta: Catppuccin Mocha (espelha o prompt do zsh)
# Última revisão: 2026-05-23
# ─────────────────────────────────────────────────────────────

# ── Comportamento básico ─────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g extended-keys on
set -g display-time 2000
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
setw -g mode-keys vi

# Activity sem som, só visual
set -g monitor-activity on
set -g visual-activity off

# Cores e passthrough
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",xterm-256color:Tc"
set -ag terminal-overrides ",xterm-kitty:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ── Paleta Catppuccin Mocha (variáveis) ──────────────────────
%hidden BASE="#1e1e2e"
%hidden MANTLE="#181825"
%hidden SURFACE0="#313244"
%hidden SURFACE1="#45475a"
%hidden OVERLAY0="#6c7086"
%hidden OVERLAY1="#7f849c"
%hidden SUBTEXT="#a6adc8"
%hidden TEXT="#cdd6f4"
%hidden BLUE="#89b4fa"
%hidden MAUVE="#cba6f7"
%hidden GREEN="#a6e3a1"
%hidden YELLOW="#f9e2af"
%hidden PEACH="#fab387"
%hidden RED="#f38ba8"

# ── Bindings de janelas e painéis ────────────────────────────
bind a last-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize repetível
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alt+setas pra navegar (sem prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# vim-tmux-navigator (sem plugin) — Ctrl+h/j/k/l
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Mover painéis entre janelas
bind J choose-tree 'join-pane -s %%'
bind B break-pane
bind S choose-tree 'join-pane -t %%'

# Recarrega config
bind r source-file ~/.tmux.conf \; display "  config recarregada"

# ── Copy mode (vi) + clipboard ───────────────────────────────
bind Escape copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy + flash verde de ~180ms na seleção pra confirmar.
# macOS only (pbcopy). Pra adicionar Linux: trocar pbcopy por wl-copy/xclip
# ou usar set-clipboard external (já habilitado acima via `set -g set-clipboard on`).
bind-key -T copy-mode-vi y \
    send-keys -X copy-pipe-no-clear pbcopy \;\
    set -g mode-style "bg=$GREEN,fg=$BASE" \;\
    run-shell -b "sleep 0.18 && tmux set -g mode-style 'bg=#89b4fa,fg=#1e1e2e'"

bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-no-clear pbcopy \;\
    set -g mode-style "bg=$GREEN,fg=$BASE" \;\
    run-shell -b "sleep 0.18 && tmux set -g mode-style 'bg=#89b4fa,fg=#1e1e2e'"

# ── Popups e scripts ─────────────────────────────────────────
# FZF rápido (nova janela)
bind o new-window -c "#{pane_current_path}" "bash ~/.config/tmux/scripts/fzf-open.sh '#{pane_current_path}'"
bind l new-window -c "#{pane_current_path}" "bash ~/.config/tmux/scripts/fzf-open.sh '#{pane_current_path}' git"

# FZF popup elegante
bind O display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "bash ~/.config/tmux/scripts/fzf-open-robust.sh '#{pane_id}'"
bind L display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "bash ~/.config/tmux/scripts/fzf-open-robust.sh '#{pane_id}' git"

# Cheatsheet vertical estilo which-key, colado à esquerda, altura total.
# -x 0 -y 0 = canto superior esquerdo · largura fixa 52 cols cabe nomes longos.
bind h display-popup -E -w 52 -h 100% -x 0 -y 0 "~/.config/tmux/scripts/cheatsheet.sh"

# Comando rápido (popup efêmero)
bind p display-popup -E -w 80% -h 80%
bind P command-prompt -p "Comando:" "display-popup -E -w 80%% -h 80%% '%%'"

# Scratch session
bind t if-shell "tmux has-session -t scratch 2>/dev/null" \
    "if-shell \"[ \\\"$(tmux display-message -p '#S')\\\" = scratch ]\" \
        'detach-client' \
        'display-popup -E -w 80% -h 80% \"tmux attach -t scratch\"'" \
    "display-popup -E -w 80% -h 80% 'tmux new-session -s scratch'"
bind T run-shell "~/.config/tmux/scripts/scratch-toggle.sh"

# Capture-pane → arquivo único, abre no $EDITOR
bind C-p run-shell 'f="/tmp/tmux-capture-$(date +%s).txt"; tmux capture-pane -pS - > "$f" && tmux new-window "${EDITOR:-nvim} $f"'

# ── Aparência: status bar (top) ──────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 100

set -g status-style "bg=$BASE,fg=$TEXT"
set -g message-style "bg=$SURFACE0,fg=$TEXT"
set -g mode-style "bg=$BLUE,fg=$BASE"

# Bordas de pane
set -g pane-border-style "fg=$SURFACE0"
set -g pane-active-border-style "fg=$BLUE"
set -g pane-border-status top
set -g pane-border-format "#[fg=$OVERLAY0] #{?pane_active,#[fg=$BLUE],}#P #[fg=$OVERLAY0]· #{pane_current_command} "

# status-left: sessão em mauve (coerente com o path do prompt zsh)
# Indicadores de prefix e copy-mode aparecem ao lado, só quando ativos.
set -g status-left "#[fg=$MAUVE,bold]  #S #[fg=$OVERLAY0]·#{?client_prefix, #[fg=$BASE#,bg=$RED#,bold] PFX ,}#{?pane_in_mode, #[fg=$BASE#,bg=$YELLOW#,bold] CPY ,} "

# Janelas: indicador `▎` sutil no current, sem bloco cheio.
set -g window-status-separator ""
set -g window-status-format         "#[fg=$OVERLAY0]  #I #[fg=$SUBTEXT]#W#{?window_activity_flag,#[fg=$YELLOW] •,}  "
set -g window-status-current-format "#[fg=$BLUE]▎#[fg=$TEXT,bold]#I #[fg=$TEXT]#W#{?window_zoomed_flag,#[fg=$PEACH] 󰊓,}  "

# status-right: script gera git/venv/path; hora vem direto do tmux (formats não
# são re-interpretados dentro do output de #(...)).
set -g status-right "#(~/.config/tmux/scripts/status-right.sh #{pane_current_path})#[fg=$OVERLAY0] %H:%M "
