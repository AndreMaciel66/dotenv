# Prefix: Ctrl+a (mais acessível que Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reduz delay do Escape (padrão 500ms)
set -sg escape-time 10

# Detecção de foco (necessário para nvim autoread)
set -g focus-events on

# OSC 52 clipboard (funciona sobre SSH)
set -g set-clipboard on

# Suporte a modifiers extras (tmux 3.2+)
set -g extended-keys on

# Mensagens visíveis por 2s
set -g display-time 2000

# Alternar para última janela
bind a last-window

# FZF - buscar e abrir arquivos (em nova janela, fecha quando sair)
bind o new-window -c "#{pane_current_path}" "bash ~/.config/tmux/scripts/fzf-open.sh '#{pane_current_path}'"
bind l new-window -c "#{pane_current_path}" "bash ~/.config/tmux/scripts/fzf-open.sh '#{pane_current_path}' git"

# FZF robusto - com popup elegante
bind O display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "bash ~/.config/tmux/scripts/fzf-open-robust.sh '#{pane_id}'"
bind L display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "bash ~/.config/tmux/scripts/fzf-open-robust.sh '#{pane_id}' git"

# Modo vi para navegação
setw -g mode-keys vi
bind Escape copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Clipboard: detecta OS (macOS → pbcopy, Wayland → wl-copy, X11 → xclip)
if-shell "uname | grep -q Darwin" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "if-shell 'command -v wl-copy >/dev/null 2>&1' \
        'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"' \
        'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"xclip -selection clipboard\"'"

# Mouse habilitado + copia ao selecionar
set -g mouse on
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "if-shell 'command -v wl-copy >/dev/null 2>&1' \
        'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"wl-copy\"' \
        'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"xclip -selection clipboard\"'"

# Copy-mode highlight style (Catppuccin Mocha)
set -g mode-style "fg=#1e1e2e,bg=#89b4fa"

# Histórico maior
set -g history-limit 10000

# Começar janelas e painéis em 1 (não 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumerar janelas ao fechar
set -g renumber-windows on

# Dividir painéis com | e -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navegar entre painéis com Alt+setas
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize de painéis (prefix + H/J/K/L, repetível)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# vim-tmux-navigator (sem plugin) — Ctrl+h/j/k/l
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Recarregar config
bind r source-file ~/.tmux.conf \; display "Config recarregada!"

# Cheatsheet popup
bind h display-popup -E -w 112 -h 90% "~/.config/tmux/scripts/cheatsheet.sh"

# Popup flutuante para comando rápido (efêmero)
bind p display-popup -E -w 80% -h 80%
bind P command-prompt -p "Comando:" "display-popup -E -w 80%% -h 80%% '%%'"

# Scratch terminal (pode virar pane depois)
bind t if-shell "tmux has-session -t scratch 2>/dev/null" \
    "if-shell \"[ \\\"$(tmux display-message -p '#S')\\\" = scratch ]\" \
        'detach-client' \
        'display-popup -E -w 80% -h 80% \"tmux attach -t scratch\"'" \
    "display-popup -E -w 80% -h 80% 'tmux new-session -s scratch'"

# Toggle pane para/do scratch (shift+t)
bind T run-shell "~/.config/tmux/scripts/scratch-toggle.sh"

# Capture-pane — salva buffer completo e abre no vim
bind C-p run-shell "tmux capture-pane -pS - > /tmp/tmux-capture-$(date +%s).txt && tmux new-window 'vim /tmp/tmux-capture-*.txt'"

# Cores e visual
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",xterm-256color:Tc"
set -ag terminal-overrides ",xterm-kitty:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Permitir protocolo de imagem do Kitty passar pelo tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Catppuccin Mocha
set -g status-style bg="#1e1e2e",fg="#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] "
set -g status-right-length 80
set -g status-right "#(~/.config/tmux/scripts/status-right.sh #{pane_current_path})"
set -g status-interval 5
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I:#W#{?window_zoomed_flag, 󰊓,} "
set -g window-status-separator ""
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#89b4fa"
set -g message-style bg="#313244",fg="#cdd6f4"
bind-key J choose-tree 'join-pane -s %%'
bind-key B break-pane
bind-key S choose-tree 'join-pane -t %%'
